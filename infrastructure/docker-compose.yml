# =============================================================================
# PH Agent Hub — Docker Compose (Development)
# =============================================================================
# Start with:  docker compose up --build
# Stop with:   docker compose down
#
# This is the canonical dev setup. Anyone can clone the repo and run it.
# Uses nginx as reverse proxy with all ports exposed for debugging.
# =============================================================================

name: phagent-hub
services:
  # ── MariaDB ──────────────────────────────────────────────────────────────
  mariadb:
    image: mariadb:11
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: phagent_hub
      MYSQL_USER: phagent
      MYSQL_PASSWORD: phagent_password
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - phagent-network

  # ── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - phagent-network

  # ── MinIO ────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - phagent-network

  # ── Backend ──────────────────────────────────────────────────────────────
  backend:
    build: ../backend
    env_file: ./env
    command:
      - sh
      - -c
      - alembic upgrade head && uvicorn src.main:app --host 0.0.0.0 --port 8000
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    networks:
      - phagent-network

  # ── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    build: ../frontend
    env_file: ./env
    depends_on:
      - backend
    ports:
      - "3000:3000"
    networks:
      - phagent-network

  # ── phpMyAdmin ───────────────────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root_password
    depends_on:
      - mariadb
    ports:
      - "8080:80"
    networks:
      - phagent-network

  # ── Nginx ────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    networks:
      - phagent-network

volumes:
  mariadb_data:
  redis_data:
  minio_data:

networks:
  phagent-network:
    driver: bridge

